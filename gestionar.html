<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionar - CrediListo</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-4">
    <div class="max-w-4xl mx-auto space-y-6 pb-20">
        <div class="flex justify-between items-center">
            <button onclick="window.history.back()" class="text-indigo-600 font-bold text-sm">← VOLVER</button>
            <h1 class="text-xl font-black text-indigo-900 italic">FICHA DE GESTIÓN</h1>
        </div>

        <div class="bg-white p-6 rounded-3xl shadow-sm border">
            <h2 class="text-sm font-black mb-4 uppercase tracking-widest text-gray-400">Control de Pagos</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-xs">
                    <thead><tr class="text-left border-b bg-gray-50"><th class="p-2">#</th><th>Vence</th><th>Fecha Pago</th><th>Monto $</th><th class="text-right">Acción</th></tr></thead>
                    <tbody id="listaCuotas"></tbody>
                </table>
            </div>
        </div>

        <div class="bg-white p-6 rounded-3xl shadow-sm border text-xs">
            <h2 class="text-sm font-black mb-4 uppercase text-indigo-900 border-b pb-2">Información Completa</h2>
            <div id="fichaDatos" class="grid grid-cols-2 md:grid-cols-3 gap-4">
                </div>
            <div class="mt-6 flex gap-2">
                <button onclick="guardarFicha()" class="bg-indigo-600 text-white px-6 py-3 rounded-2xl font-bold flex-grow shadow-lg">GUARDAR CAMBIOS EN FICHA</button>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const clienteId = parseInt(urlParams.get('id'));
        let db = JSON.parse(localStorage.getItem('credilisto_v1')) || [];
        let p = db.find(x => x.id === clienteId);

        function renderFicha() {
            if(!p) return;
            const campos = [
                {label: 'Nombre', key: 'nombre', val: p.nombre},
                {label: 'DUI', key: 'dui', val: p.dui},
                {label: 'Teléfono', key: 'tel', val: p.tel},
                {label: 'Negocio', key: 'negocio', val: p.negocio},
                {label: 'Dirección', key: 'dir', val: p.dir},
                {label: 'Motivo', key: 'motivo', val: p.motivo},
                {label: 'Nota Actual', key: 'nota', val: p.nota},
                {label: 'Contraseña Cliente', key: 'pass', val: p.pass}
            ];
            
            let h = "";
            campos.forEach(c => {
                h += `<div><label class="font-bold text-gray-400 uppercase text-[9px]">${c.label}</label>
                      <input id="f_${c.key}" type="text" value="${c.val || ''}" class="w-full p-2 border rounded-xl mt-1"></div>`;
            });
            document.getElementById('fichaDatos').innerHTML = h;

            renderCuotas();
        }

        function renderCuotas() {
            let h = "";
            p.cuotas.forEach(c => {
                h += `<tr class="border-b ${c.pagada ? 'bg-green-50' : ''}">
                    <td class="p-2 font-bold">${c.n}</td>
                    <td>${c.v}</td>
                    <td>${c.pagada ? c.fechaPago : `<input type="date" id="date_${c.n}" class="border p-1 rounded" value="${new Date().toISOString().split('T')[0]}">`}</td>
                    <td>${c.pagada ? c.valorPagado.toFixed(2) : `<input type="number" id="val_${c.n}" class="border p-1 w-16 font-bold" value="${p.vCuota.toFixed(2)}">`}</td>
                    <td class="text-right p-2">${c.pagada ? '✅' : `<button onclick="cobrar(${c.n})" class="bg-blue-600 text-white px-3 py-1 rounded font-bold">COBRAR</button>`}</td>
                </tr>`;
            });
            document.getElementById('listaCuotas').innerHTML = h;
        }

        function cobrar(n) {
            const c = p.cuotas.find(x => x.n === n);
            const inputVal = document.getElementById(`val_${n}`).value;
            const inputDate = document.getElementById(`date_${n}`).value;
            
            c.pagada = true;
            c.fechaPago = inputDate;
            c.valorPagado = parseFloat(inputVal);

            // Cálculo de nota
            let retrasos = 0;
            p.cuotas.filter(cuo => cuo.pagada).forEach(cuo => {
                let diff = (new Date(cuo.fechaPago) - new Date(cuo.v)) / 86400000;
                if(diff > 0) retrasos += diff;
            });
            p.nota = retrasos == 0 ? 'A' : (retrasos <= 3 ? 'B' : (retrasos <= 7 ? 'C' : 'F'));

            localStorage.setItem('credilisto_v1', JSON.stringify(db));
            renderFicha();
        }

        function guardarFicha() {
            p.nombre = document.getElementById('f_nombre').value;
            p.dui = document.getElementById('f_dui').value;
            p.tel = document.getElementById('f_tel').value;
            p.negocio = document.getElementById('f_negocio').value;
            p.dir = document.getElementById('f_dir').value;
            p.motivo = document.getElementById('f_motivo').value;
            p.nota = document.getElementById('f_nota').value;
            p.pass = document.getElementById('f_pass').value;

            localStorage.setItem('credilisto_v1', JSON.stringify(db));
            alert("Ficha actualizada");
        }

        window.onload = renderFicha;
    </script>
</body>
</html>
